name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      issues: read
      pull-requests: read
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Lvyizhuo
          template: classic
          config_timezone: Asia/Shanghai
          config_twemoji: yes
          config_octicon: yes
          config_mode: auto
          # 👇 关键：生成时就铺满宽度
          config_output_width: 100%

          # 基础
          base: header, activity, community, repositories, metadata

          # 成就
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: no
          plugin_achievements_restricted: no

          # 流量
          plugin_traffic: yes

          # 3D日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 语言卡片（生成即满宽）
          plugin_languages: yes
          plugin_languages_analysis: repositories
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_width: 100%

          # 连续提交
          plugin_streak: yes

          # 名言
          plugin_quotes: yes