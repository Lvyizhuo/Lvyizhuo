name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
      issues: read
      pull-requests: read
      repository-projects: read
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Lvyizhuo
          template: classic
          config_timezone: Asia/Shanghai
          config_twemoji: yes
          config_octicon: yes
          config_mode: auto
          # 👇 关键：生成即满宽 + 缩小字体
          config_output_width: 100%
          config_font_size: 12
          config_line_height: 1.2

          # 基础模块
          base: header, activity, community, repositories, metadata

          # 🏆 成就模块（修复不显示的核心配置）
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: no
          plugin_achievements_restricted: no
          plugin_achievements_limit: 8

          # 🧮 仓库流量
          plugin_traffic: yes

          # 📅 3D等距贡献日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 🛠️ 技能语言卡片（缩小字体+满宽）
          plugin_languages: yes
          plugin_languages_analysis: repositories
          plugin_languages_limit: 8
          plugin_languages_details: bytes-size, percentage
          plugin_languages_width: 100%
          plugin_languages_font_size: 11

          # 🔥 连续提交 streak
          plugin_streak: yes

          # ✍️ 动态名言
          plugin_quotes: yes
          plugin_quotes_font_size: 12