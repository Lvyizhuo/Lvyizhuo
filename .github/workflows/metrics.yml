name: Metrics
on:
  schedule: [{cron: "0 * * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: read
      pull-requests: read
      actions: read

    steps:
      - uses: stalomeow/metrics@4fca5f91c5432c68955ea66a8fa7c6a51f58644e # lowlighter/metrics@latest fork fixing Projects classic deprecation (issue #1706)
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Lvyizhuo
          template: classic
          config_timezone: Asia/Shanghai
          config_twemoji: yes
          config_octicon: yes
          config_display: large

          # 基础信息
          base: header, activity, community, repositories, metadata

          # 成就 (修复不显示的问题)
          plugin_achievements: yes
          # 将阈值设为 X 可以强制显示所有成就（方便排查是否是数据问题），排查成功后可改回 C 或 B
          plugin_achievements_threshold: X
          # 推荐使用 compact 紧凑模式，排版更美观且不易超出图片高度限制
          plugin_achievements_display: compact 

          # 流量
          plugin_traffic: yes

          # 3D 日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 语言统计
          plugin_languages: yes
          plugin_languages_limit: 16
          plugin_languages_details: bytes-size, percentage
          
          # 注意：plugin_streak 和 plugin_quotes 已移除，因为原项目不支持此功能

      - uses: stalomeow/metrics@4fca5f91c5432c68955ea66a8fa7c6a51f58644e
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Lvyizhuo
          template: classic
          filename: metrics.plugin.16personalities.svg
          config_timezone: Asia/Shanghai
          base: ""

          # 16personalities 人格展示
          plugin_16personalities: yes
          plugin_16personalities_url: ${{ secrets.SIXTEEN_PERSONALITIES_URL }}
          plugin_16personalities_sections: personality, traits
          plugin_16personalities_scores: yes