<svg xmlns="http://www.w3.org/2000/svg" width="240" height="290">
  <defs>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    </style>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="100%" stop-color="#2d2060"/>
    </linearGradient>
    <linearGradient id="coatGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e2466"/>
      <stop offset="100%" stop-color="#1c154a"/>
    </linearGradient>
  </defs>

  <!-- Card background -->
  <rect width="240" height="290" rx="16" fill="url(#bgGrad)"/>
  <rect width="240" height="290" rx="16" fill="none" stroke="#7c6fd4" stroke-width="1.5" opacity="0.7"/>

  <!-- Subtle architectural grid background -->
  <g opacity="0.05" stroke="white" stroke-width="0.8">
    <line x1="40"  y1="0"   x2="40"  y2="290"/>
    <line x1="80"  y1="0"   x2="80"  y2="290"/>
    <line x1="120" y1="0"   x2="120" y2="290"/>
    <line x1="160" y1="0"   x2="160" y2="290"/>
    <line x1="200" y1="0"   x2="200" y2="290"/>
    <line x1="0"   y1="40"  x2="240" y2="40"/>
    <line x1="0"   y1="80"  x2="240" y2="80"/>
    <line x1="0"   y1="120" x2="240" y2="120"/>
    <line x1="0"   y1="160" x2="240" y2="160"/>
    <line x1="0"   y1="200" x2="240" y2="200"/>
  </g>

  <!-- ===== CHARACTER ===== -->

  <!-- Ground shadow -->
  <ellipse cx="120" cy="228" rx="50" ry="7" fill="#000" opacity="0.3"/>

  <!-- Coat / body -->
  <path d="M 73 226 L 83 148 Q 120 138 157 148 L 167 226 Z" fill="url(#coatGrad)"/>
  <!-- Coat centre panel -->
  <path d="M 120 138 L 109 158 L 106 226 L 120 222 L 134 226 L 131 158 Z" fill="#15103a"/>
  <!-- Coat lapels -->
  <path d="M 107 144 L 120 166 L 133 144 L 126 140 L 120 155 L 114 140 Z" fill="#3b2e7a"/>
  <!-- Shirt front -->
  <rect x="117" y="144" width="6" height="24" rx="1" fill="white" opacity="0.88"/>

  <!-- Left arm -->
  <path d="M 83 152 L 64 205 L 76 209 L 90 162" fill="url(#coatGrad)"/>
  <!-- Right arm -->
  <path d="M 157 152 L 176 205 L 164 209 L 150 162" fill="url(#coatGrad)"/>

  <!-- Left hand -->
  <ellipse cx="70" cy="213" rx="8" ry="7" fill="#f3c5a3"/>
  <!-- Right hand -->
  <ellipse cx="170" cy="213" rx="8" ry="7" fill="#f3c5a3"/>

  <!-- Blueprint in right hand -->
  <rect x="162" y="203" width="22" height="17" rx="2" fill="#ede8ce" opacity="0.92"/>
  <line x1="165" y1="207" x2="181" y2="207" stroke="#5a4f9c" stroke-width="0.8"/>
  <line x1="165" y1="210" x2="181" y2="210" stroke="#5a4f9c" stroke-width="0.8"/>
  <line x1="165" y1="213" x2="176" y2="213" stroke="#5a4f9c" stroke-width="0.8"/>
  <rect x="170" y="207" width="7" height="5" fill="none" stroke="#5a4f9c" stroke-width="0.8"/>

  <!-- Neck -->
  <rect x="114" y="122" width="12" height="18" rx="3" fill="#f3c5a3"/>

  <!-- Head -->
  <ellipse cx="120" cy="95" rx="30" ry="31" fill="#f3c5a3"/>

  <!-- Hair -->
  <path d="M 90 87 Q 90 62 120 60 Q 150 62 150 87 L 148 76 Q 140 57 120 56 Q 100 57 92 76 Z" fill="#2c2040"/>
  <path d="M 90 88 L 90 80" stroke="#2c2040" stroke-width="5" stroke-linecap="round" fill="none"/>
  <path d="M 150 88 L 150 80" stroke="#2c2040" stroke-width="5" stroke-linecap="round" fill="none"/>

  <!-- Eyebrows (slightly furrowed) -->
  <path d="M 104 83 Q 109 80 114 82" stroke="#2c2040" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  <path d="M 126 82 Q 131 80 136 83" stroke="#2c2040" stroke-width="1.8" fill="none" stroke-linecap="round"/>

  <!-- Eyes (white + iris) -->
  <ellipse cx="109" cy="91" rx="6"   ry="6.5" fill="white"/>
  <ellipse cx="131" cy="91" rx="6"   ry="6.5" fill="white"/>
  <circle  cx="110" cy="92" r="3.5"  fill="#3b2d82"/>
  <circle  cx="132" cy="92" r="3.5"  fill="#3b2d82"/>
  <circle  cx="111" cy="91" r="1.3"  fill="#000"/>
  <circle  cx="133" cy="91" r="1.3"  fill="#000"/>
  <!-- Eye shine -->
  <circle  cx="112" cy="89" r="1"    fill="white"/>
  <circle  cx="134" cy="89" r="1"    fill="white"/>

  <!-- Glasses frames -->
  <rect x="101" y="85" width="16" height="13" rx="6" fill="none" stroke="#6052a8" stroke-width="1.8"/>
  <rect x="123" y="85" width="16" height="13" rx="6" fill="none" stroke="#6052a8" stroke-width="1.8"/>
  <line x1="117" y1="91" x2="123" y2="91" stroke="#6052a8" stroke-width="1.5"/>
  <!-- Temple pieces -->
  <line x1="101" y1="91" x2="95"  y2="94" stroke="#6052a8" stroke-width="1.5"/>
  <line x1="139" y1="91" x2="145" y2="94" stroke="#6052a8" stroke-width="1.5"/>

  <!-- Mouth (subtle smirk) -->
  <path d="M 113 107 Q 120 111 127 107" fill="none" stroke="#c09077" stroke-width="1.5" stroke-linecap="round"/>

  <!-- ===== LABEL ===== -->

  <!-- Separator -->
  <line x1="20" y1="242" x2="220" y2="242" stroke="#7c6fd4" stroke-width="1" opacity="0.45"/>

  <!-- Type -->
  <text x="120" y="265" font-size="28" font-weight="700" fill="white" text-anchor="middle" letter-spacing="4">INTJ</text>
  <!-- Subtitle -->
  <text x="120" y="282" font-size="11" fill="#a89ed4" text-anchor="middle">建筑师 · Architect</text>
</svg>