<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 450" width="300" height="450">
  <defs>
    <style>
      @keyframes float {
        0%, 100% { transform: translateY(0px); }
        50%       { transform: translateY(-9px); }
      }
      @keyframes aura-pulse {
        0%, 100% { opacity: 0.25; r: 72; }
        50%       { opacity: 0.45; r: 80; }
      }
      @keyframes star-twinkle {
        0%, 100% { opacity: 0.2; }
        50%       { opacity: 0.85; }
      }
      @keyframes blink {
        0%, 88%, 100% { transform: scaleY(1); }
        93%            { transform: scaleY(0.08); }
      }
      .char        { animation: float 4s ease-in-out infinite; }
      .aura        { animation: aura-pulse 3s ease-in-out infinite; transform-origin: 150px 175px; }
      .s1          { animation: star-twinkle 2.1s ease-in-out infinite; }
      .s2          { animation: star-twinkle 3.3s ease-in-out infinite 0.8s; }
      .s3          { animation: star-twinkle 2.7s ease-in-out infinite 1.4s; }
      .eye-l       { animation: blink 7s ease-in-out infinite; transform-origin: 132px 148px; }
      .eye-r       { animation: blink 7s ease-in-out infinite; transform-origin: 168px 148px; }
      text         { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    </style>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#100e24"/>
      <stop offset="100%" stop-color="#1e1840"/>
    </linearGradient>

    <!-- Coat gradient -->
    <linearGradient id="coat" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%"   stop-color="#2e2768"/>
      <stop offset="100%" stop-color="#18133c"/>
    </linearGradient>

    <!-- Skin gradient -->
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f5c9a8"/>
      <stop offset="100%" stop-color="#e8ae88"/>
    </linearGradient>

    <!-- Radial glow behind character -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#6a55d4" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#6a55d4" stop-opacity="0"/>
    </radialGradient>

    <!-- Trait bar gradient -->
    <linearGradient id="bar-mind"     x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4298b4"/><stop offset="100%" stop-color="#6ec6e8"/>
    </linearGradient>
    <linearGradient id="bar-energy"   x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e4ae3a"/><stop offset="100%" stop-color="#f7d470"/>
    </linearGradient>
    <linearGradient id="bar-nature"   x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#33a474"/><stop offset="100%" stop-color="#5dcf9e"/>
    </linearGradient>
    <linearGradient id="bar-tactics"  x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#88619a"/><stop offset="100%" stop-color="#b08ec4"/>
    </linearGradient>
    <linearGradient id="bar-identity" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f25e62"/><stop offset="100%" stop-color="#f98a8d"/>
    </linearGradient>

    <clipPath id="card-clip">
      <rect width="300" height="450" rx="18"/>
    </clipPath>
  </defs>

  <!-- ── Card shell ── -->
  <rect width="300" height="450" rx="18" fill="url(#bg)"/>
  <rect width="300" height="450" rx="18" fill="none" stroke="#5a4faa" stroke-width="1.4" opacity="0.75"/>
  <!-- Top colour bar (INTJ Analyst purple) -->
  <rect x="0" y="0" width="300" height="5" rx="3" fill="#4a3faa"/>

  <!-- ── Background grid ── -->
  <g clip-path="url(#card-clip)" opacity="0.045" stroke="#9988ff" stroke-width="0.6">
    <line x1="50"  y1="0"   x2="50"  y2="450"/>
    <line x1="100" y1="0"   x2="100" y2="450"/>
    <line x1="150" y1="0"   x2="150" y2="450"/>
    <line x1="200" y1="0"   x2="200" y2="450"/>
    <line x1="250" y1="0"   x2="250" y2="450"/>
    <line x1="0"   y1="55"  x2="300" y2="55"/>
    <line x1="0"   y1="110" x2="300" y2="110"/>
    <line x1="0"   y1="165" x2="300" y2="165"/>
    <line x1="0"   y1="220" x2="300" y2="220"/>
    <line x1="0"   y1="275" x2="300" y2="275"/>
    <line x1="0"   y1="330" x2="300" y2="330"/>
    <line x1="0"   y1="385" x2="300" y2="385"/>
    <line x1="0"   y1="440" x2="300" y2="440"/>
  </g>

  <!-- ── Twinkling stars ── -->
  <circle class="s1" cx="28"  cy="38"  r="1.8" fill="#c4b8f0"/>
  <circle class="s2" cx="265" cy="22"  r="1.4" fill="#c4b8f0"/>
  <circle class="s3" cx="280" cy="58"  r="1.2" fill="#c4b8f0"/>
  <circle class="s1" cx="18"  cy="80"  r="1.0" fill="#c4b8f0"/>
  <circle class="s2" cx="285" cy="100" r="1.6" fill="#c4b8f0"/>
  <circle class="s3" cx="36"  cy="130" r="1.1" fill="#c4b8f0"/>
  <circle class="s1" cx="270" cy="155" r="1.3" fill="#c4b8f0"/>
  <circle class="s2" cx="22"  cy="195" r="1.0" fill="#c4b8f0"/>

  <!-- ── Radial aura (animated) ── -->
  <circle class="aura" cx="150" cy="175" r="76" fill="url(#glow)"/>

  <!-- ════════════════════════════
       CHARACTER GROUP (floats)
       ════════════════════════════ -->
  <g class="char">

    <!-- Ground shadow -->
    <ellipse cx="150" cy="308" rx="58" ry="7" fill="#000" opacity="0.28"/>

    <!-- ── Trench coat body ── -->
    <path d="M 95 300 L 106 205 Q 150 192 194 205 L 205 300 Z" fill="url(#coat)"/>
    <!-- Dark centre panel -->
    <path d="M 150 192 L 138 218 L 135 300 L 150 295 L 165 300 L 162 218 Z" fill="#120f2e"/>
    <!-- Lapels -->
    <path d="M 138 198 L 150 226 L 162 198 L 155 193 L 150 212 L 145 193 Z" fill="#3a2e80"/>
    <!-- Shirt strip -->
    <rect x="147" y="198" width="6" height="30" rx="2" fill="white" opacity="0.9"/>
    <!-- Coat collar highlights -->
    <path d="M 138 194 L 128 208 L 140 215 L 150 193 L 160 215 L 172 208 L 162 194" fill="#272060" stroke="#4a3faa" stroke-width="0.6"/>
    <!-- Belt line -->
    <line x1="137" y1="252" x2="163" y2="252" stroke="#30285a" stroke-width="1.4"/>
    <rect x="146" y="249" width="8" height="6" rx="1" fill="none" stroke="#5a4faa" stroke-width="1.1"/>

    <!-- Left arm -->
    <path d="M 106 210 L 80 280 L 94 285 L 116 222" fill="url(#coat)"/>
    <!-- Right arm -->
    <path d="M 194 210 L 220 280 L 206 285 L 184 222" fill="url(#coat)"/>

    <!-- Left hand -->
    <ellipse cx="87"  cy="289" rx="10" ry="9" fill="url(#skin)"/>
    <!-- Right hand -->
    <ellipse cx="213" cy="289" rx="10" ry="9" fill="url(#skin)"/>

    <!-- Blueprint in right hand -->
    <rect x="204" y="276" width="26" height="20" rx="2" fill="#eae4c2" opacity="0.9"/>
    <line x1="207" y1="281" x2="227" y2="281" stroke="#4a3faa" stroke-width="0.8"/>
    <line x1="207" y1="285" x2="227" y2="285" stroke="#4a3faa" stroke-width="0.8"/>
    <line x1="207" y1="289" x2="221" y2="289" stroke="#4a3faa" stroke-width="0.8"/>
    <rect x="218" y="280" width="8" height="7" fill="none" stroke="#4a3faa" stroke-width="0.8"/>

    <!-- Neck -->
    <rect x="143" y="170" width="14" height="24" rx="4" fill="url(#skin)"/>

    <!-- ── Head ── -->
    <ellipse cx="150" cy="135" rx="40" ry="42" fill="url(#skin)"/>

    <!-- Ears -->
    <ellipse cx="110" cy="137" rx="5.5" ry="9"  fill="#e8ae88"/>
    <ellipse cx="190" cy="137" rx="5.5" ry="9"  fill="#e8ae88"/>

    <!-- Hair top -->
    <path d="M 110 126 Q 110 90 150 86 Q 190 90 190 126 L 187 112 Q 178 82 150 79 Q 122 82 113 112 Z" fill="#1c162e"/>
    <!-- Hair sides -->
    <path d="M 110 127 L 110 114" stroke="#1c162e" stroke-width="8"  stroke-linecap="round" fill="none"/>
    <path d="M 190 127 L 190 114" stroke="#1c162e" stroke-width="8"  stroke-linecap="round" fill="none"/>
    <!-- Forelock -->
    <path d="M 142 90 Q 139 100 144 108" stroke="#1c162e" stroke-width="3" stroke-linecap="round" fill="none"/>

    <!-- Eyebrows (furrowed, analytical) -->
    <path d="M 120 118 Q 128 113 136 117" stroke="#1c162e" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M 164 117 Q 172 113 180 118" stroke="#1c162e" stroke-width="2.4" fill="none" stroke-linecap="round"/>

    <!-- Eye whites -->
    <ellipse cx="132" cy="130" rx="9"   ry="9"   fill="white"/>
    <ellipse cx="168" cy="130" rx="9"   ry="9"   fill="white"/>
    <!-- Iris (deep indigo) -->
    <circle  class="eye-l" cx="132" cy="131" r="6"  fill="#3b2d82"/>
    <circle  class="eye-r" cx="168" cy="131" r="6"  fill="#3b2d82"/>
    <!-- Pupils -->
    <circle  cx="133" cy="132" r="3"   fill="#0d0820"/>
    <circle  cx="169" cy="132" r="3"   fill="#0d0820"/>
    <!-- Catch-lights -->
    <circle  cx="135" cy="128" r="1.8" fill="white" opacity="0.9"/>
    <circle  cx="171" cy="128" r="1.8" fill="white" opacity="0.9"/>

    <!-- Glasses frames (round, wire) -->
    <rect x="120" y="122" width="22" height="17" rx="8"  fill="none" stroke="#7060c8" stroke-width="1.9"/>
    <rect x="158" y="122" width="22" height="17" rx="8"  fill="none" stroke="#7060c8" stroke-width="1.9"/>
    <!-- Bridge -->
    <line x1="142" y1="130" x2="158" y2="130" stroke="#7060c8" stroke-width="1.7"/>
    <!-- Temples -->
    <line x1="120" y1="130" x2="113" y2="134" stroke="#7060c8" stroke-width="1.7"/>
    <line x1="180" y1="130" x2="187" y2="134" stroke="#7060c8" stroke-width="1.7"/>

    <!-- Nose (subtle) -->
    <path d="M 147 141 Q 150 150 153 141" fill="none" stroke="#c0906a" stroke-width="1.1" opacity="0.65"/>

    <!-- Mouth (composed, slight upward right) -->
    <path d="M 141 161 Q 150 167 159 161" fill="none" stroke="#bf8060" stroke-width="1.9" stroke-linecap="round"/>

  </g>
  <!-- ── end character ── -->

  <!-- ── Separator ── -->
  <line x1="24" y1="324" x2="276" y2="324" stroke="#5a4faa" stroke-width="1" opacity="0.55"/>

  <!-- Group label -->
  <text x="150" y="342" font-size="10" fill="#8877cc" text-anchor="middle" letter-spacing="2.5">ANALYSTS</text>

  <!-- Type code -->
  <text x="150" y="368" font-size="38" font-weight="700" fill="white" text-anchor="middle" letter-spacing="7">INTJ</text>

  <!-- Role name -->
  <text x="150" y="385" font-size="12.5" fill="#b0a0e0" text-anchor="middle" letter-spacing="1.2">Architect · 建筑师</text>

  <!-- ── Trait bars ── -->
  <!-- Mind: 73% Introverted -->
  <text x="24"  y="404" font-size="8.5" fill="#4298b4">Introverted</text>
  <text x="276" y="404" font-size="8.5" fill="#4298b4" text-anchor="end">73%</text>
  <rect x="24"  y="406" width="252" height="4" rx="2" fill="#ffffff10"/>
  <rect x="24"  y="406" width="184" height="4" rx="2" fill="url(#bar-mind)"/>

  <!-- Energy: 82% Intuitive -->
  <text x="24"  y="417" font-size="8.5" fill="#e4ae3a">Intuitive</text>
  <text x="276" y="417" font-size="8.5" fill="#e4ae3a" text-anchor="end">82%</text>
  <rect x="24"  y="419" width="252" height="4" rx="2" fill="#ffffff10"/>
  <rect x="24"  y="419" width="207" height="4" rx="2" fill="url(#bar-energy)"/>

  <!-- Nature: 61% Thinking -->
  <text x="24"  y="430" font-size="8.5" fill="#33a474">Thinking</text>
  <text x="276" y="430" font-size="8.5" fill="#33a474" text-anchor="end">61%</text>
  <rect x="24"  y="432" width="252" height="4" rx="2" fill="#ffffff10"/>
  <rect x="24"  y="432" width="154" height="4" rx="2" fill="url(#bar-nature)"/>
</svg>